model:
  model_type: trm_official_sudoku
  d_model: 512
  # ff_hidden = 1536 matches the "Less is More" (Jolicoeur-Martineau, 2025) TRM
  # reference architecture. The reference SwiGLU applies the Llama convention
  # (ff_hidden ≈ 2/3 × hidden × expansion, rounded to a multiple of 256), so
  # hidden=512, expansion=4 → ff_hidden=1536. This is also the shape expected
  # by the HF reference checkpoint (hf_checkpoints/ARC/step_723914), enabling the
  # remap-and-fine-tune path in scripts/remap_hf_checkpoint.py.
  ff_hidden: 1536
  n_heads: 8
  vocab_size: 11
  seq_len: 81
  num_classes: 11

  # Official TRM architecture (paper-faithful for the attention variant)
  H_cycles: 3
  L_cycles: 6                   # paper-faithful (Sanjin sudoku-att all_config.yaml); was 4
  L_layers: 2
  num_task_types: 2
  task_emb_len: 16
  task_emb_ndim: 512
  halt_max_steps: 16
  halt_exploration_prob: 0.1
  no_ACT_continue: true         # paper-faithful (Sanjin sudoku-att all_config.yaml); was false
  forward_dtype: bfloat16
  mlp_t: false                  # attention variant — 77.70% target (use trm_official_sudoku_mlp.yaml for the 84.80% MLP variant)

training:
  lr: 0.0001
  betas: [0.9, 0.95]
  weight_decay: 1.0       # paper-faithful (Sanjin sudoku-att all_config.yaml); was 0.1
  warmup_steps: 2000
  batch_size: 64
  epochs: 500
  ema_decay: 0.999
  max_grad_norm: 1.0

  optimizer: adam_atan2
  task_emb_lr: 0.0001     # paper-faithful (== global lr); was 0.01 (100x too high)
  task_emb_weight_decay: 1.0  # paper-faithful; was 0.1
  task_id: 0

  use_wandb: true
  wandb_project: TRM
  wandb_entity: ""                    # set via TRM_WANDB_ENTITY in .env
  log_interval: 10
  eval_interval: 50     # run full test-split eval every 50 epochs (vs every 10 when 0)
  save_interval: 20
  hf_repo_id: ""                      # set via TRM_HF_REPO_ID in .env

  # Crash-recovery rolling backup — set via TRM_ROLLING_CHECKPOINT_DIR in .env
  # (blank = disabled; example: D:/ml-trm-checkpoints/sudoku-att)
  rolling_checkpoint_dir: ""
  rolling_checkpoint_max: 3
  rolling_checkpoint_interval: 25

  # Milestone snapshots (10%, 25%, 50%, 75% of training) for thesis analysis
  milestone_checkpoints: true

  # Upload best.pt as a versioned wandb Artifact on every new best
  wandb_best_artifact: false

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 0

seed: 42
device: cuda
checkpoint_dir: "C:/TRM checkpoints/sudoku-att"
experiment_dir: experiments/sudoku-att
