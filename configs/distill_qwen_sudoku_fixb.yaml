# Distill a small student from the Qwen2.5-0.5B Sudoku LoRA teacher
# retrained under Fix B (commit 58faf5c — sudoku-id ↔ LLM digit-token
# remap + 11-dim vocab loss in src/models/baseline_llm.py).
#
# Identical to configs/distill_qwen_sudoku.yaml except output dirs are
# moved to non-OneDrive C:/ml-trm-work/ to dodge the Files-On-Demand
# RECALL_ON_DATA_ACCESS bug (see findings.md §5.11). Teacher inherits
# the freshly trained Qwen-Fix-B checkpoint.
#
# Launch (M5):
#   python main.py --mode distill \
#     --config configs/distill_qwen_sudoku_fixb.yaml \
#     --checkpoint C:/ml-trm-work/llm-qwen-sudoku-seed0-fixb/qwen2.5_0.5b_sudoku_latest.pt \
#     --seed 0

model:
  model_type: llm_distill

  # Task vocabulary — must match the teacher's training set.
  vocab_size: 11
  seq_len: 81
  num_classes: 11

  # Teacher tokenizer / architecture (used by main._run_distill to rebuild
  # the teacher from the saved config, then load the checkpoint passed via
  # --checkpoint).
  llm_name: Qwen/Qwen2.5-0.5B
  lora_r: 8
  lora_alpha: 16
  use_qlora: false

  # Student architecture (~2.4M params).
  distill_n_layers: 3
  distill_d_model: 256
  distill_ff_hidden: 1024
  distill_n_heads: 4

training:
  lr: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.01
  warmup_steps: 200
  batch_size: 32
  grad_accum_steps: 1
  epochs: 30
  distill_alpha: 0.7
  distill_temperature: 4.0

  use_wandb: true
  wandb_project: TRM-LLM
  wandb_entity: ""
  log_interval: 10
  save_interval: 10

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 4

seed: 42
device: cuda
# Non-OneDrive output paths — see findings.md §5.11 for why.
checkpoint_dir: C:/ml-trm-work/distill-qwen-sudoku-seed0-fixb
experiment_dir: C:/ml-trm-work/distill-qwen-sudoku-seed0-fixb
