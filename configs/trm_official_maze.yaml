model:
  model_type: trm_official_maze
  d_model: 512
  # ff_hidden = 1536 matches the "Less is More" (Jolicoeur-Martineau, 2025) TRM
  # reference architecture. See configs/trm_official_sudoku.yaml for the full
  # rationale.
  ff_hidden: 1536
  n_heads: 8
  vocab_size: 6
  seq_len: 900
  num_classes: 6

  # Official TRM architecture
  H_cycles: 3
  L_cycles: 4
  L_layers: 2
  num_task_types: 2
  task_emb_len: 16
  task_emb_ndim: 512
  halt_max_steps: 16
  halt_exploration_prob: 0.1
  no_ACT_continue: true   # paper-faithful (Sanjin maze all_config.yaml); was false
  forward_dtype: bfloat16
  mlp_t: false

training:
  lr: 0.0001
  betas: [0.9, 0.95]
  weight_decay: 0.1       # fine-tune from HF checkpoint (paper's 1.0 is for from-scratch; see findings.md §5.10)
  warmup_steps: 2000
  batch_size: 8
  epochs: 5000
  ema_decay: 0.999
  max_grad_norm: 1.0

  optimizer: adam_atan2
  task_emb_lr: 0.0001     # paper-faithful (== global lr); was 0.01
  task_emb_weight_decay: 0.1  # fine-tune from HF checkpoint (paper's 1.0 is for from-scratch)
  q_loss_weight: 0.01     # fine-tune: reduce Q-loss contribution so it doesn't hijack backbone (paper uses 0.5; see findings.md §5.9)
  task_id: 1

  use_wandb: true
  wandb_project: TRM
  wandb_entity: ""                    # set via TRM_WANDB_ENTITY in .env
  log_interval: 10
  save_interval: 20
  hf_repo_id: ""                      # set via TRM_HF_REPO_ID in .env

  # Crash-recovery rolling backup — set via TRM_ROLLING_CHECKPOINT_DIR in .env
  # (blank = disabled; example: D:/ml-trm-checkpoints/maze-official)
  rolling_checkpoint_dir: ""
  rolling_checkpoint_max: 3
  rolling_checkpoint_interval: 50

  # Milestone snapshots (10%, 25%, 50%, 75% of training) for thesis analysis
  milestone_checkpoints: true

  # Upload best.pt as a versioned wandb Artifact on every new best
  wandb_best_artifact: false

data:
  dataset: maze
  # 8× dihedral-augmented variant: 8000 train / 1000 test (was 1000/1000).
  # The augmented train set slows the train-accuracy saturation so the
  # learning curve is informative past the first few hundred epochs.
  # Rebuild: `python data/build_maze_dataset.py --aug --output-dir maze-30x30-hard-1k-aug`
  # (run from the data/ dir, or pass an absolute output path).
  data_dir: data/maze-30x30-hard-1k-aug
  num_workers: 4
  # false = grade all 900 cells (walls, open, S, G, path) in the CE loss.
  # true = paper's masked behavior, which admits a constant-`o` degenerate
  # optimum and was responsible for the 100%-but-fake maze-seed0 result.
  mask_non_path: false

seed: 42
device: cuda
checkpoint_dir: "C:/TRM checkpoints/maze-official"
experiment_dir: experiments/maze-official
