model:
  model_type: trm_official_sudoku
  d_model: 512
  # ff_hidden = 1536 for the regular FFN. The local SwiGLU computes
  # ff_hidden = int(hidden_size * expansion), where expansion is derived from
  # ff_hidden / d_model = 3.0 here, giving 1536. The token-mixer (mlp_t) does
  # NOT use this formula — it pins the Llama-rounded ff_hidden=512 inside
  # TRMBlock via the explicit `ff_hidden=` kwarg, matching the published
  # Sanjin2024 sudoku-mlp checkpoint.
  ff_hidden: 1536
  n_heads: 8
  vocab_size: 11
  seq_len: 81
  num_classes: 11

  # Official TRM architecture (paper-faithful for the MLP variant)
  H_cycles: 3
  L_cycles: 6                   # Sanjin2024 all_config.yaml — paper-faithful (was 4 in attention variant)
  L_layers: 2
  num_task_types: 2
  task_emb_len: 16
  task_emb_ndim: 512
  halt_max_steps: 16
  halt_exploration_prob: 0.1
  no_ACT_continue: true         # Sanjin2024 all_config.yaml — paper-faithful (was false in attention variant)
  forward_dtype: bfloat16
  mlp_t: true                   # MLP token-mixer variant — the headline 84.80% Sudoku result

training:
  lr: 0.0001
  betas: [0.9, 0.95]
  weight_decay: 1.0       # paper-faithful (Sanjin sudoku-mlp all_config.yaml); was 0.1
  warmup_steps: 2000
  batch_size: 64
  epochs: 500
  ema_decay: 0.999
  max_grad_norm: 1.0

  optimizer: adam_atan2
  task_emb_lr: 0.0001     # paper-faithful (== global lr); was 0.01 (100x too high)
  task_emb_weight_decay: 1.0  # paper-faithful; was 0.1
  task_id: 0

  use_wandb: true
  wandb_project: TRM
  wandb_entity: ""                    # set via TRM_WANDB_ENTITY in .env
  log_interval: 5
  eval_interval: 50     # run full test-split eval every 50 epochs (vs every 5 when 0)
  save_interval: 25
  hf_repo_id: ""                      # set via TRM_HF_REPO_ID in .env

  # Crash-recovery rolling backup — set via TRM_ROLLING_CHECKPOINT_DIR in .env
  # (blank = disabled; example: D:/ml-trm-checkpoints/sudoku-mlp)
  rolling_checkpoint_dir: ""
  rolling_checkpoint_max: 3
  rolling_checkpoint_interval: 25

  # Milestone snapshots (10%, 25%, 50%, 75% of training) for thesis analysis
  milestone_checkpoints: true

  # Upload best.pt as a versioned wandb Artifact on every new best
  wandb_best_artifact: false

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 0

seed: 42
device: cuda
# Separate checkpoint dir from the attention-variant config so neither training
# can clobber the other's latest.pt. Initialize from
# hf_checkpoints/Sudoku-Extreme-mlp/remapped_for_local.pt via --init-weights.
checkpoint_dir: "C:/TRM checkpoints/sudoku-mlp"
experiment_dir: experiments/sudoku-mlp
