model:
  model_type: llm_finetune
  vocab_size: 6           # maze charset (#  SGo) + 0 pad
  seq_len: 900            # 30x30 maze flattened
  num_classes: 6
  llm_name: gpt2          # max_position_embeddings=1024, fits seq_len=900
  lora_r: 8
  lora_alpha: 16
  use_qlora: false
  use_gradient_checkpointing: true # seq_len=900 (near 1024 ctx) benefits from checkpointing

training:
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.01
  warmup_steps: 500
  batch_size: 4           # ~11x longer seq than sudoku -> /4 batch
  grad_accum_steps: 4     # effective batch 16
  epochs: 30
  use_wandb: true
  wandb_project: TRM-LLM
  wandb_entity: ""        # set via TRM_WANDB_ENTITY in .env
  log_interval: 10
  save_interval: 50

data:
  dataset: maze
  data_dir: data/maze-30x30-hard-1k-aug
  num_workers: 4

seed: 42
device: cuda
checkpoint_dir: models/llm
experiment_dir: experiments/llm
