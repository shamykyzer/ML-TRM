model:
  model_type: llm_finetune
  vocab_size: 11
  seq_len: 81
  num_classes: 11
  llm_name: Qwen/Qwen2.5-0.5B
  lora_r: 8
  lora_alpha: 16
  use_qlora: false

training:
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.01
  warmup_steps: 500
  batch_size: 16
  grad_accum_steps: 1
  epochs: 30
  use_wandb: true
  wandb_project: TRM-LLM
  wandb_entity: ""                    # set via TRM_WANDB_ENTITY in .env
  log_interval: 10
  save_interval: 50

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 4

seed: 42
device: cuda
checkpoint_dir: models/llm
experiment_dir: experiments/llm
