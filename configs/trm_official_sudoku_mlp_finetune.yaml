model:
  model_type: trm_official_sudoku
  d_model: 512
  ff_hidden: 1536
  n_heads: 8
  vocab_size: 11
  seq_len: 81
  num_classes: 11

  H_cycles: 3
  L_cycles: 6
  L_layers: 2
  num_task_types: 2
  task_emb_len: 16
  task_emb_ndim: 512
  halt_max_steps: 16
  # 0.0 for fine-tune: preserve the pretrained Q-halt calibration.
  halt_exploration_prob: 0.0
  no_ACT_continue: true
  forward_dtype: bfloat16
  mlp_t: true

training:
  # 10x lower than scratch (1e-4) to avoid destroying the HF checkpoint's
  # features in the first few thousand steps.
  lr: 0.00001
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_steps: 200
  batch_size: 64
  epochs: 200
  ema_decay: 0.999
  max_grad_norm: 1.0

  optimizer: adam_atan2
  task_emb_lr: 0.00001
  task_emb_weight_decay: 0.1
  # Freeze Q-head gradient flow — keep pretrained halting calibration.
  q_loss_weight: 0.0
  task_id: 0

  use_wandb: true
  wandb_project: TRM
  wandb_entity: ""
  log_interval: 10
  eval_interval: 10
  save_interval: 10
  hf_repo_id: ""

  rolling_checkpoint_dir: ""
  rolling_checkpoint_max: 3
  rolling_checkpoint_interval: 25

  milestone_checkpoints: true
  wandb_best_artifact: false

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 0

seed: 42
device: cuda
checkpoint_dir: "C:/TRM checkpoints/sudoku-mlp-finetune"
experiment_dir: experiments/sudoku-mlp-finetune
