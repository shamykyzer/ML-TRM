model:
  model_type: trm_sudoku
  d_model: 512
  ff_hidden: 2048
  n_heads: 8
  vocab_size: 11        # pad=0, tokens 1-10
  seq_len: 81           # 9x9 grid
  num_classes: 11       # ignore index 0 in loss

training:
  lr: 0.0001             # paper default
  betas: [0.9, 0.95]
  weight_decay: 1.0       # paper default
  warmup_steps: 2000
  batch_size: 64          # fits N_sup=16 on 12GB (RTX 5070)
  grad_accum_steps: 1
  epochs: 500
  ema_decay: 0.999
  n_latent: 6           # inner recursion steps
  T_deep: 3             # outer recursion passes
  N_sup: 16             # paper default (Less is More, Jolicoeur-Martineau 2025)
  act_threshold: 0.5
  max_grad_norm: 1.0
  use_wandb: true
  wandb_project: TRM
  wandb_entity: ""                    # set via TRM_WANDB_ENTITY in .env
  log_interval: 10       # validate every 10 epochs
  save_interval: 20      # checkpoint every 20 epochs
  hf_repo_id: ""                      # set via TRM_HF_REPO_ID in .env

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 0    # Windows requires 0 (multiprocessing DataLoader crashes on Windows)

seed: 42
device: cuda
checkpoint_dir: models/sudoku
experiment_dir: experiments/sudoku
