model:
  model_type: trm_sudoku
  d_model: 512
  ff_hidden: 2048
  n_heads: 8
  vocab_size: 11        # pad=0, tokens 1-10
  seq_len: 81           # 9x9 grid
  num_classes: 11       # ignore index 0 in loss

training:
  lr: 0.0001             # paper default
  betas: [0.9, 0.95]
  weight_decay: 1.0       # paper default
  warmup_steps: 2000
  batch_size: 32          # small for N_sup=16 VRAM
  grad_accum_steps: 1
  epochs: 500
  ema_decay: 0.999
  n_latent: 6           # inner recursion steps
  T_deep: 3             # outer recursion passes
  N_sup: 16             # paper default — full deep supervision
  act_threshold: 0.5
  max_grad_norm: 1.0
  use_wandb: false
  log_interval: 5        # validate every 5 epochs
  save_interval: 25      # checkpoint every 25 epochs

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 0    # Windows requires 0 (multiprocessing DataLoader crashes on Windows)

seed: 42
device: cuda
checkpoint_dir: models/sudoku
experiment_dir: experiments/sudoku
