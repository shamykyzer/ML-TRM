model:
  model_type: trm_sudoku
  d_model: 512
  ff_hidden: 2048
  n_heads: 8
  vocab_size: 11        # pad=0, tokens 1-10
  seq_len: 81           # 9x9 grid
  num_classes: 11       # ignore index 0 in loss

training:
  lr: 0.0001
  betas: [0.9, 0.95]
  weight_decay: 1.0
  warmup_steps: 2000
  batch_size: 48          # auto-tuned per GPU at runtime
  grad_accum_steps: 1    # not used -- deep supervision does its own optimizer steps
  epochs: 500
  ema_decay: 0.999
  n_latent: 6           # inner recursion steps
  T_deep: 3             # outer recursion passes
  N_sup: 4              # supervision steps (reduced for RTX 4060 speed)
  act_threshold: 0.5
  max_grad_norm: 1.0
  use_wandb: false
  log_interval: 10       # validate every 10 epochs
  save_interval: 50      # checkpoint every 50 epochs

data:
  dataset: sudoku
  data_dir: data/sudoku-extreme-full
  num_workers: 0    # Windows requires 0 (multiprocessing DataLoader crashes on Windows)

seed: 42
device: cuda
checkpoint_dir: models/sudoku
experiment_dir: experiments/sudoku
