model:
  model_type: trm_maze
  d_model: 512
  ff_hidden: 2048
  n_heads: 8
  vocab_size: 6         # pad=0, CHARSET '#'=1,' '=2,'S'=3,'G'=4,'o'=5
  seq_len: 900          # 30x30 grid
  num_classes: 6        # ignore index 0 in loss

training:
  lr: 0.0001
  betas: [0.9, 0.95]
  weight_decay: 1.0
  warmup_steps: 2000
  batch_size: 16
  grad_accum_steps: 48  # effective batch = 768
  epochs: 2000          # reduced from 5000 -- augmented data compensates
  ema_decay: 0.999
  n_latent: 6
  T_deep: 3
  N_sup: 16
  act_threshold: 0.5
  max_grad_norm: 1.0
  use_wandb: true
  wandb_project: TRM
  wandb_entity: ""                    # set via TRM_WANDB_ENTITY in .env
  log_interval: 10
  save_interval: 20

data:
  dataset: maze
  data_dir: data/maze-30x30-hard-1k  # use augmented data (8K samples)
  num_workers: 4

seed: 42
device: cuda
checkpoint_dir: models/maze
experiment_dir: experiments/maze
