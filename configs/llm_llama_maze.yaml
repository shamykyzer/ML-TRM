model:
  model_type: llm_finetune
  vocab_size: 6
  seq_len: 900
  num_classes: 6
  llm_name: meta-llama/Llama-3.2-1B
  lora_r: 8
  lora_alpha: 16
  use_qlora: true                  # 1.2B params x 900 tokens — required on 12GB GPU
  use_gradient_checkpointing: true # further memory reduction at seq_len=900

training:
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.01
  warmup_steps: 500
  batch_size: 1           # 1.2B params x 900 tokens — tight on 12GB
  grad_accum_steps: 16    # effective batch 16
  epochs: 30
  use_wandb: true
  wandb_project: TRM-LLM
  wandb_entity: ""
  log_interval: 10
  save_interval: 20

data:
  dataset: maze
  data_dir: data/maze-30x30-hard-1k-aug
  num_workers: 4

seed: 42
device: cuda
checkpoint_dir: models/llm
experiment_dir: experiments/llm
